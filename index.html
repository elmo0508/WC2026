<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Bracket</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0f1a;
  color:white;
}

h1,h2{text-align:center}

/* GROUPS */
.groups{
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.group{
  min-width:240px;
  background:#161b2a;
  border-radius:10px;
  padding:10px;
}

.rankBox{
  font-size:12px;
  background:#0f1422;
  padding:6px;
  border-radius:6px;
  margin-bottom:8px;
  color:#aaa;
}

.teamBtn{
  width:100%;
  padding:6px;
  margin:4px 0;
  border-radius:6px;
  border:1px solid #333;
  background:#0f1422;
  color:white;
  text-align:left;
  cursor:pointer;
}

.teamBtn.selected{background:#1f6feb}

/* BUTTONS */
.resetBtn,.nextBtn{
  width:100%;
  margin-top:6px;
  padding:10px;
  border:none;
  border-radius:6px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.resetBtn{background:#ff3b30}
.nextBtn{background:#1f6feb}

.bottomBtns{
  max-width:240px;
  margin:auto;
  padding:10px;
}

/* THIRD PLACE */
.thirdRanker{
  display:none;
  padding:10px;
  background:#161b2a;
}

.thirdItem{
  padding:10px;
  margin:6px 0;
  background:#0f1422;
  border-radius:6px;
  border:1px solid #333;
  cursor:pointer;
}

.thirdItem.selected{background:#1f6feb}

/* BRACKET */
.wrapper{
  overflow-x:auto;
  padding:20px;
}

.bracket{
  display:flex;
  gap:40px;
}

.round{min-width:200px}

.match{
  background:#161b2a;
  border-radius:10px;
  margin:15px 0;
  padding:6px;
}

.slot{
  padding:6px;
  cursor:pointer;
}

.slot.winner{background:#1f6feb}

/* RESULTS */
#results div{
  margin:8px 0;
  font-size:18px;
}

/* FLAGS */
.flag{
  width:18px;
  height:12px;
  margin-right:6px;
  vertical-align:middle;
}
</style>
</head>

<body>

<h1>⚽ World Cup 2026 Bracket</h1>

<!-- GROUPS -->
<div class="groups" id="groups"></div>

<!-- THIRD PLACE -->
<div id="thirdUI" class="thirdRanker">
  <h2>Best 3rd Place Teams</h2>
  <div id="thirdList"></div>
  <button class="nextBtn" onclick="build()">Build Knockout</button>
</div>

<!-- KNOCKOUT + EVERYTHING CAPTURED -->
<div class="wrapper" id="captureArea">

  <h2>Knockout Stage</h2>
  <div id="bracket" class="bracket"></div>

  <div id="results" style="display:none; text-align:center; padding:20px;">
    <h2>🏆 Final Results</h2>
    <div id="champion"></div>
    <div id="runnerup"></div>
    <div id="thirdplace"></div>
  </div>

</div>

<!-- BUTTONS -->
<div class="bottomBtns">
<button class="resetBtn" onclick="resetAll()">Reset All</button>
<button class="resetBtn" onclick="resetKnockout()">Reset Knockout</button>
<button class="nextBtn" onclick="exportPNG()">Export PNG</button>
<button class="nextBtn" onclick="shareText()">Share Link</button>
</div>

<!-- html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

/* FLAGS */
const flags={
Czechia:"cz","South Korea":"kr",Mexico:"mx","South Africa":"za",
Switzerland:"ch",Canada:"ca","Bosnia and Herzegovina":"ba",Qatar:"qa",
Brazil:"br",Morocco:"ma","Scotland":"gb",Haiti:"ht",
"United States":"us",Turkey:"tr",Paraguay:"py",Australia:"au",
Germany:"de",Ecuador:"ec","Ivory Coast":"ci","Curaçao":"cw",
Netherlands:"nl",Japan:"jp",Sweden:"se",Tunisia:"tn",
Belgium:"be",Egypt:"eg",Iran:"ir","New Zealand":"nz",
Spain:"es",Uruguay:"uy","Saudi Arabia":"sa","Cape Verde":"cv",
France:"fr",Norway:"no",Senegal:"sn",Iraq:"iq",
Argentina:"ar",Austria:"at",Algeria:"dz",Jordan:"jo",
Portugal:"pt",Colombia:"co","Congo DR":"cd",Uzbekistan:"uz",
England:"gb",Croatia:"hr",Ghana:"gh",Panama:"pa"
};

function renderTeam(name){
  return `${flags[name]?`<img src="https://flagcdn.com/w40/${flags[name]}.png" class="flag">`:"🏳️"} ${name}`;
}

/* GROUPS */
const groups={
A:["Czechia","South Korea","Mexico","South Africa"],
B:["Switzerland","Canada","Bosnia and Herzegovina","Qatar"],
C:["Brazil","Morocco","Scotland","Haiti"],
D:["United States","Turkey","Paraguay","Australia"],
E:["Germany","Ecuador","Ivory Coast","Curaçao"],
F:["Netherlands","Japan","Sweden","Tunisia"],
G:["Belgium","Egypt","Iran","New Zealand"],
H:["Spain","Uruguay","Saudi Arabia","Cape Verde"],
I:["France","Norway","Senegal","Iraq"],
J:["Argentina","Austria","Algeria","Jordan"],
K:["Portugal","Colombia","Congo DR","Uzbekistan"],
L:["England","Croatia","Ghana","Panama"]
};

let picks={},thirdPool=[],selectedThird=[],rounds=[],semiLosers=[],thirdWinner=null;

/* INIT */
function init(){
  const c=document.getElementById("groups");

  Object.keys(groups).forEach(g=>{
    picks[g]=[];

    const box=document.createElement("div");
    box.className="group";
    box.id="group-"+g;

    box.innerHTML=`
      <h3>Group ${g}</h3>
      <div class="rankBox" id="rank-${g}">
        1st -<br>2nd -<br>3rd -<br>4th -
      </div>

      ${groups[g].map(t=>`
        <div class="teamBtn" onclick="pick('${g}','${t}',this)">
          ${renderTeam(t)}
        </div>
      `).join("")}

      <button class="resetBtn" onclick="resetGroup('${g}')">Reset Group</button>
    `;

    c.appendChild(box);
  });
}

/* PICK */
function pick(g,t,el){
  if(picks[g].includes(t)){
    picks[g]=picks[g].filter(x=>x!==t);
    el.classList.remove("selected");
  } else {
    if(picks[g].length>=4) return;
    picks[g].push(t);
    el.classList.add("selected");
  }

  update(g);

  if(Object.values(picks).every(x=>x.length===4)){
    prepareThirdPlace();
  } else {
    document.getElementById("thirdUI").style.display="none";
  }
}

/* UPDATE */
function update(g){
  const r=picks[g];
  document.getElementById("rank-"+g).innerHTML=`
    1st ${r[0]?renderTeam(r[0]):"-"}<br>
    2nd ${r[1]?renderTeam(r[1]):"-"}<br>
    3rd ${r[2]?renderTeam(r[2]):"-"}<br>
    4th ${r[3]?renderTeam(r[3]):"-"}
  `;
}

/* THIRD PLACE */
function prepareThirdPlace(){
  thirdPool=[]; selectedThird=[];
  Object.values(picks).forEach(g=>thirdPool.push(g[2]));

  const list=document.getElementById("thirdList");
  list.innerHTML="";

  thirdPool.forEach(t=>{
    const div=document.createElement("div");
    div.className="thirdItem";
    div.innerHTML=renderTeam(t);

    div.onclick=()=>{
      if(selectedThird.includes(t)){
        selectedThird=selectedThird.filter(x=>x!==t);
        div.classList.remove("selected");
      } else {
        if(selectedThird.length>=8) return;
        selectedThird.push(t);
        div.classList.add("selected");
      }
    };

    list.appendChild(div);
  });

  document.getElementById("thirdUI").style.display="block";
}

/* BUILD */
function build(){
  const first=[],second=[];
  Object.values(picks).forEach(g=>{
    first.push(g[0]);
    second.push(g[1]);
  });

  rounds=[
    [
      [first[0],second[1]],
      [first[1],second[0]],
      [first[2],selectedThird[0]],
      [first[3],selectedThird[1]],
      [first[4],second[2]],
      [first[5],second[3]],
      [first[6],selectedThird[2]],
      [first[7],selectedThird[3]]
    ]
  ];

  rounds[1]=Array(4).fill(0).map(()=>[null,null]);
  rounds[2]=Array(2).fill(0).map(()=>[null,null]);
  rounds[3]=[[null,null]];

  semiLosers=[];
  draw();
}

/* DRAW */
function draw(){
  const b=document.getElementById("bracket");
  b.innerHTML="";

  rounds.forEach((r,ri)=>{
    const col=document.createElement("div");
    col.className="round";

    r.forEach((m,mi)=>{
      const d=document.createElement("div");
      d.className="match";

      d.innerHTML=`
        <div class="slot" onclick="win(${ri},${mi},0,this)">${m[0]?renderTeam(m[0]):""}</div>
        <div class="slot" onclick="win(${ri},${mi},1,this)">${m[1]?renderTeam(m[1]):""}</div>
      `;

      col.appendChild(d);
    });

    b.appendChild(col);
  });
}

/* WIN */
function win(r,m,s,el){
  const w=rounds[r][m][s];
  const loser=rounds[r][m][s===0?1:0];

  el.parentElement.querySelectorAll(".slot")
    .forEach(x=>x.classList.remove("winner"));

  el.classList.add("winner");

  if(r===2) semiLosers[m]=loser;

  if(r===3){
    showResults(w,loser);
    return;
  }

  const next=Math.floor(m/2);
  const slot=m%2;

  rounds[r+1][next][slot]=w;

  setTimeout(draw,150);
}

/* 3RD PLACE */
function thirdWin(i,el){
  thirdWinner=semiLosers[i];

  el.parentElement.querySelectorAll(".slot")
    .forEach(x=>x.classList.remove("winner"));

  el.classList.add("winner");

  document.getElementById("thirdplace").innerHTML=
    `🥉 3rd Place: ${renderTeam(thirdWinner)}`;
}

/* RESULTS */
function showResults(champ,runner){
  document.getElementById("results").style.display="block";

  document.getElementById("champion").innerHTML=
    `🥇 Champion: ${renderTeam(champ)}`;

  document.getElementById("runnerup").innerHTML=
    `🥈 Runner-up: ${renderTeam(runner)}`;
}

/* EXPORT PNG */
function exportPNG(){
  html2canvas(document.getElementById("captureArea"),{
    backgroundColor:"#0b0f1a",
    scale:2
  }).then(canvas=>{
    const link=document.createElement("a");
    link.download="world-cup-bracket.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
  });
}

/* SHARE LINK */
function shareText(){
  const data={picks,selectedThird,rounds};
  const encoded=btoa(JSON.stringify(data));
  const url=window.location.origin+window.location.pathname+"?data="+encoded;

  navigator.clipboard.writeText(url);
  alert("Link copied 📩");
}

/* RESET */
function resetGroup(g){
  picks[g]=[];
  document.getElementById("rank-"+g).innerHTML=`1st -<br>2nd -<br>3rd -<br>4th -`;
  document.querySelectorAll("#group-"+g+" .teamBtn")
    .forEach(b=>b.classList.remove("selected"));
  document.getElementById("thirdUI").style.display="none";
}

function resetAll(){ location.reload(); }

function resetKnockout(){
  rounds=[];
  semiLosers=[];
  thirdWinner=null;
  document.getElementById("bracket").innerHTML="";
  document.getElementById("results").style.display="none";
}

/* START */
init();

</script>
</body>
</html>
