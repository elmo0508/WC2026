<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Bracket</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0f1a;
  color:white;
}

h1,h2{text-align:center}

/* ---------------- GROUPS ---------------- */
.groups{
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.group{
  min-width:240px;
  background:#161b2a;
  border-radius:10px;
  padding:10px;
}

.rankBox{
  font-size:12px;
  background:#0f1422;
  padding:6px;
  border-radius:6px;
  margin-bottom:8px;
  color:#aaa;
}

.teamBtn{
  width:100%;
  padding:6px;
  margin:4px 0;
  border-radius:6px;
  border:1px solid #333;
  background:#0f1422;
  color:white;
  text-align:left;
}

.teamBtn.selected{background:#1f6feb}

/* ---------------- BUTTONS ---------------- */
.resetBtn,.shareBtn,.nextBtn{
  width:100%;
  margin-top:6px;
  padding:10px;
  border:none;
  border-radius:6px;
  color:white;
  font-weight:600;
}

.resetBtn{background:#ff3b30}
.shareBtn{background:#34c759; display:none}
.nextBtn{background:#1f6feb}

/* ---------------- THIRD PLACE ---------------- */
.thirdRanker{
  display:none;
  padding:10px;
  background:#161b2a;
}

.thirdItem{
  padding:10px;
  margin:6px 0;
  background:#0f1422;
  border-radius:6px;
  border:1px solid #333;
  cursor:pointer;
}

.thirdItem.selected{background:#1f6feb}

/* ---------------- BRACKET ---------------- */
.wrapper{
  position:relative;
  overflow-x:auto;
  padding:30px;
}

.bracket{
  display:flex;
  gap:90px;
  position:relative;
  z-index:2;
}

.round{min-width:220px}

.match{
  background:#161b2a;
  border-radius:10px;
  margin:22px 0;
  padding:6px;
  border:1px solid #222;
}

.slot{
  padding:8px;
  cursor:pointer;
  border-radius:6px;
}

.slot:hover{background:#222a40}

.slot.winner{
  background:#1f6feb;
  color:white;
}

/* ---------------- FLAGS ---------------- */
.flag{
  width:18px;
  height:12px;
  margin-right:6px;
  vertical-align:middle;
}

/* ---------------- SVG LINES ---------------- */
svg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:2600px;
  z-index:1;
  pointer-events:none;
}

.path{
  stroke:#58a6ff;
  stroke-width:2;
  fill:none;
  stroke-dasharray:10;
  stroke-dashoffset:1000;
  animation:flow 1.5s linear forwards;
}

@keyframes flow{
  to{stroke-dashoffset:0;}
}
</style>
</head>

<body>

<h1>⚽ World Cup 2026 Bracket</h1>

<div id="groups" class="groups"></div>

<!-- THIRD PLACE UI -->
<div id="thirdUI" class="thirdRanker">
  <h2>Select Best 8 Third-Place Teams</h2>
  <div id="thirdList"></div>
  <button class="nextBtn" onclick="build()">Build Knockout</button>
</div>

<h2>Knockout Stage</h2>

<div class="wrapper" id="captureArea">
<svg id="svg"></svg>
<div id="bracket" class="bracket"></div>
</div>

<div style="padding:10px">
<button class="resetBtn" onclick="resetAll()">Reset All</button>
<button class="resetBtn" onclick="resetKnockout()">Reset Knockout</button>
<button class="shareBtn" id="shareBtn" onclick="shareBracket()">Share Bracket</button>
</div>

<script>

/* ---------------- FLAGS ---------------- */
const flags={
Czechia:"cz","South Korea":"kr",Mexico:"mx","South Africa":"za",
Switzerland:"ch",Canada:"ca","Bosnia and Herzegovina":"ba",Qatar:"qa",
Brazil:"br",Morocco:"ma","Scotland":"gb",Haiti:"ht",
"United States":"us",Turkey:"tr",Paraguay:"py",Australia:"au",
Germany:"de",Ecuador:"ec","Ivory Coast":"ci","Curaçao":"cw",
Netherlands:"nl",Japan:"jp",Sweden:"se",Tunisia:"tn",
Belgium:"be",Egypt:"eg",Iran:"ir","New Zealand":"nz",
Spain:"es",Uruguay:"uy","Saudi Arabia":"sa","Cape Verde":"cv",
France:"fr",Norway:"no",Senegal:"sn",Iraq:"iq",
Argentina:"ar",Austria:"at",Algeria:"dz",Jordan:"jo",
Portugal:"pt",Colombia:"co","Congo DR":"cd",Uzbekistan:"uz",
England:"gb",Croatia:"hr",Ghana:"gh",Panama:"pa"
};

function renderTeam(name){
  return `${flags[name] ? `<img src="https://flagcdn.com/w40/${flags[name]}.png" class="flag">` : "🏳️"} ${name}`;
}

/* ---------------- GROUPS ---------------- */
const groups={
A:["Czechia","South Korea","Mexico","South Africa"],
B:["Switzerland","Canada","Bosnia and Herzegovina","Qatar"],
C:["Brazil","Morocco","Scotland","Haiti"],
D:["United States","Turkey","Paraguay","Australia"],
E:["Germany","Ecuador","Ivory Coast","Curaçao"],
F:["Netherlands","Japan","Sweden","Tunisia"],
G:["Belgium","Egypt","Iran","New Zealand"],
H:["Spain","Uruguay","Saudi Arabia","Cape Verde"],
I:["France","Norway","Senegal","Iraq"],
J:["Argentina","Austria","Algeria","Jordan"],
K:["Portugal","Colombia","Congo DR","Uzbekistan"],
L:["England","Croatia","Ghana","Panama"]
};

let picks={};
let rounds=[];
let thirdPool=[];
let selectedThird=[];
let champion=null;

/* ---------------- INIT ---------------- */
function init(){
  const c=document.getElementById("groups");

  Object.keys(groups).forEach(g=>{
    picks[g]=[];

    const box=document.createElement("div");
    box.className="group";

    box.innerHTML=`
      <h3>Group ${g}</h3>

      <div class="rankBox" id="rank-${g}">
        1st -<br>2nd -<br>3rd -<br>4th -
      </div>

      ${groups[g].map(t=>`
        <div class="teamBtn" onclick="pick('${g}','${t}',this)">
          ${renderTeam(t)}
        </div>
      `).join("")}
    `;

    c.appendChild(box);
  });
}

/* ---------------- PICK ---------------- */
function pick(g,t,el){
  if(picks[g].includes(t)) return;

  picks[g].push(t);
  el.classList.add("selected");

  update(g);

  if(Object.values(picks).every(x=>x.length===4)){
    prepareThirdPlace();
  }
}

/* ---------------- UPDATE ---------------- */
function update(g){
  const r=picks[g];

  document.getElementById("rank-"+g).innerHTML=`
    1st ${renderTeam(r[0]||"-")}<br>
    2nd ${renderTeam(r[1]||"-")}<br>
    3rd ${renderTeam(r[2]||"-")}<br>
    4th ${renderTeam(r[3]||"-")}
  `;
}

/* ---------------- THIRD PLACE SELECTION ---------------- */
function prepareThirdPlace(){

  thirdPool=[];
  Object.values(picks).forEach(g=>{
    thirdPool.push(g[2]);
  });

  const ui=document.getElementById("thirdUI");
  const list=document.getElementById("thirdList");

  list.innerHTML="";

  thirdPool.forEach(t=>{
    const div=document.createElement("div");
    div.className="thirdItem";
    div.innerHTML=renderTeam(t);

    div.onclick=()=>{
      if(selectedThird.includes(t)){
        selectedThird=selectedThird.filter(x=>x!==t);
        div.classList.remove("selected");
      } else {
        if(selectedThird.length>=8) return;
        selectedThird.push(t);
        div.classList.add("selected");
      }
    };

    list.appendChild(div);
  });

  ui.style.display="block";
}

/* ---------------- BUILD ---------------- */
function build(){

  if(selectedThird.length!==8){
    alert("Select exactly 8 third-place teams");
    return;
  }

  const Q=qualify();

  rounds=[
    [
      [Q.first[0],Q.second[1]],
      [Q.first[1],Q.second[0]],
      [Q.first[2],selectedThird[0]],
      [Q.first[3],selectedThird[1]],
      [Q.first[4],Q.second[2]],
      [Q.first[5],Q.second[3]],
      [Q.first[6],selectedThird[2]],
      [Q.first[7],selectedThird[3]]
    ]
  ];

  let size=8;
  for(let i=1;i<4;i++){
    size/=2;
    rounds[i]=Array(size).fill(0).map(()=>[null,null]);
  }

  draw();
}

/* ---------------- QUALIFY ---------------- */
function qualify(){
  let a=[],b=[];
  Object.values(picks).forEach(g=>{
    a.push(g[0]);
    b.push(g[1]);
  });

  return {first:a,second:b};
}

/* ---------------- DRAW ---------------- */
function draw(){
  const b=document.getElementById("bracket");
  const svg=document.getElementById("svg");

  b.innerHTML="";
  svg.innerHTML="";

  rounds.forEach((r,ri)=>{
    const col=document.createElement("div");
    col.className="round";

    r.forEach((m,mi)=>{
      const d=document.createElement("div");
      d.className="match";

      d.innerHTML=`
        <div class="slot" onclick="win(${ri},${mi},0,this)">${m[0]?renderTeam(m[0]):""}</div>
        <div class="slot" onclick="win(${ri},${mi},1,this)">${m[1]?renderTeam(m[1]):""}</div>
      `;

      col.appendChild(d);
    });

    b.appendChild(col);
  });

  setTimeout(drawLines,120);
}

/* ---------------- WIN ---------------- */
function win(r,m,s,el){

  const w=rounds[r][m][s];

  el.parentElement.querySelectorAll(".slot")
    .forEach(x=>x.classList.remove("winner"));

  el.classList.add("winner");

  if(!rounds[r+1]) return;

  const next=Math.floor(m/2);
  const slot=m%2;

  if(!rounds[r+1][next]) rounds[r+1][next]=[null,null];

  rounds[r+1][next][slot]=w;

  setTimeout(draw,200);
}

/* ---------------- LINES ---------------- */
function drawLines(){
  const svg=document.getElementById("svg");
  const wrapper=document.querySelector(".wrapper");

  const base=wrapper.getBoundingClientRect();
  const matches=document.querySelectorAll(".match");

  for(let i=0;i<matches.length-1;i+=2){

    const a=matches[i].getBoundingClientRect();
    const b=matches[i+1].getBoundingClientRect();

    const x1=a.right-base.left;
    const y1=a.top-base.top+a.height/2;

    const x2=b.right-base.left;
    const y2=b.top-base.top+b.height/2;

    const mid=(x1+x2)/2;

    const path=document.createElementNS("http://www.w3.org/2000/svg","path");

    path.setAttribute("d",`
      M ${x1} ${y1}
      H ${mid}
      V ${y2}
      H ${x2}
    `);

    path.setAttribute("class","path");

    svg.appendChild(path);
  }
}

/* ---------------- RESET ---------------- */
function resetKnockout(){
  rounds=[];
  champion=null;
  selectedThird=[];

  document.getElementById("bracket").innerHTML="";
  document.getElementById("svg").innerHTML="";
  document.getElementById("shareBtn").style.display="none";
  document.getElementById("thirdUI").style.display="none";
}

function resetAll(){
  picks={};
  resetKnockout();
  document.getElementById("groups").innerHTML="";
  init();
}

/* ---------------- SHARE ---------------- */
function shareBracket(){
  window.print();
}

/* ---------------- START ---------------- */
init();

</script>
</body>
</html>
