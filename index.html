<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Bracket</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0f1a;
  color:white;
}

h1,h2{text-align:center}

.groups{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.group{
  min-width:240px;
  background:#161b2a;
  padding:10px;
  border-radius:10px;
}

.rankBox{
  font-size:12px;
  background:#0f1422;
  padding:6px;
  border-radius:6px;
  margin-bottom:8px;
}

.teamBtn{
  display:block;
  width:100%;
  margin:4px 0;
  padding:6px;
  background:#0f1422;
  border:1px solid #333;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.teamBtn.selected{background:#1f6feb}

.resetBtn,.nextBtn{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:6px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.resetBtn{background:#ff3b30}
.nextBtn{background:#1f6feb}

.bottomBtns{
  max-width:260px;
  margin:auto;
  padding:10px;
}

.thirdRanker{
  display:none;
  max-width:260px;
  margin:20px auto;
  background:#161b2a;
  padding:10px;
  border-radius:10px;
}

.thirdItem{
  padding:6px;
  margin:4px 0;
  background:#0f1422;
  border-radius:6px;
  cursor:pointer;
}

.thirdItem.selected{background:#1f6feb}

.bracket{
  display:flex;
  gap:40px;
  padding:20px;
}

.round{min-width:200px}

.match{
  background:#161b2a;
  margin:10px 0;
  padding:6px;
  border-radius:8px;
}

.slot{
  padding:6px;
  cursor:pointer;
}

.slot.winner{background:#1f6feb}

.flag{
  width:18px;
  margin-right:6px;
}

.roundLabel{
  text-align:center;
  font-size:11px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#8899bb;
  margin-bottom:6px;
}

#thirdPlaceArea{
  display:none;
  text-align:center;
  padding:10px 20px;
}

#results{
  display:none;
  text-align:center;
  padding:20px;
  background:#161b2a;
  border-radius:12px;
  margin:20px;
}

#champion{font-size:22px;color:#ffd700;margin:8px 0}
#runnerup{font-size:18px;color:#c0c0c0;margin:8px 0}
#third{font-size:16px;color:#cd7f32;margin:8px 0}

.shareBtn{
  display:inline-block;
  margin-top:14px;
  padding:10px 24px;
  background:#34c759;
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<div class="bottomBtns">

function init(){
  const c=document.getElementById("groups");

  Object.keys(groups).forEach(g=>{
    picks[g]=[];
    const box=document.createElement("div");
    box.className="group";

    box.innerHTML=`
      <h3>Group ${g}</h3>
      <div id="rank-${g}" class="rankBox">1st -<br>2nd -<br>3rd -<br>4th -</div>
      ${groups[g].map(t=>
        `<button class="teamBtn" onclick="pick('${g}','${t}',this)">
          ${renderTeam(t)}
        </button>`
      ).join("")}
    `;

    c.appendChild(box);
  });
}

function pick(g,t,el){
  if(picks[g].includes(t)){
    picks[g]=picks[g].filter(x=>x!==t);
    el.classList.remove("selected");
  } else {
    if(picks[g].length>=4) return;
    picks[g].push(t);
    el.classList.add("selected");
  }

  update(g);

  if(Object.values(picks).every(x=>x.length===4)){
    prepareThird();
  }
}

function update(g){
  const r=picks[g];

  document.getElementById("rank-"+g).innerHTML=
  `1st ${renderTeam(r[0])}<br>
   2nd ${renderTeam(r[1])}<br>
   3rd ${renderTeam(r[2])}<br>
   4th ${renderTeam(r[3])}`;
}

/* THIRD PLACE */
function prepareThird(){
  const list=document.getElementById("thirdList");
  list.innerHTML="";
  selectedThird=[];

  Object.entries(picks).forEach(([g,arr])=>{
    const t=arr[2];

    const div=document.createElement("div");
    div.className="thirdItem";
    div.innerHTML=renderTeam(t);

    div.onclick=()=>{
      const i=selectedThird.findIndex(x=>x.team===t);

      if(i>-1){
        selectedThird.splice(i,1);
        div.classList.remove("selected");
      } else {
        if(selectedThird.length>=8) return;
        selectedThird.push({team:t,group:g});
        div.classList.add("selected");
      }

      document.getElementById("buildBtn").disabled=
        selectedThird.length!==8;
    };

    list.appendChild(div);
  });

  document.getElementById("thirdUI").style.display="block";
}

/* FIND FIFA COMBINATION */
function getCombination(thirdTeams){
  const groups = thirdTeams.map(t=>t.group).sort().join("");

  return THIRD_COMBINATIONS.find(c=>{
    const used = Object.values(c)
      .filter(v=>v.startsWith("3"))
      .map(v=>v[1])
      .sort()
      .join("");

    return used===groups;
  });
}

/* BUILD */
function build(){

  const first=[], second=[], third=[];

  Object.entries(picks).forEach(([g,arr])=>{
    first.push({team:arr[0],group:g});
    second.push({team:arr[1],group:g});
  });

  selectedThird.forEach(t=>{
    third.push({team:t.team,group:t.group});
  });

  const firstMap={}, secondMap={}, thirdMap={};

  first.forEach(t=>firstMap[t.group]=t.team);
  second.forEach(t=>secondMap[t.group]=t.team);
  third.forEach(t=>thirdMap[t.group]=t.team);

  const combo = getCombination(third);

  if(!combo){
    console.error("No FIFA combination found");
    return;
  }

  function resolve(code){

    if(!code) return null;

    if(code.startsWith("3")){
      return thirdMap[code[1]];
    }

    if(code[1]==="1"){
      return firstMap[code[0]];
    }

    if(code[1]==="2"){
      return secondMap[code[0]];
    }

    if(code.startsWith("1")){
      const mapped = combo[code]; // "1A" -> "3E"
      if(mapped){
        return thirdMap[mapped[1]];
      }
    }

    return null;
  }

  const TEMPLATE=[
    ["A2","B2"],["F1","C2"],
    ["E1","1E"],["I1","1I"],
    ["K2","L2"],["H1","J2"],
    ["D1","1D"],["G1","1G"],
    ["C1","F2"],["E2","I2"],
    ["A1","1A"],["L1","1L"],
    ["B1","1B"],["K1","1K"],
    ["D2","G2"],["J1","H2"]
  ];

  const r32=TEMPLATE.map(m=>[
    resolve(m[0]),
    resolve(m[1])
  ]);

  rounds=[];
  rounds[0]=r32.map(m=>({teams:m,winner:null}));
  rounds[1]=Array(8).fill(0).map(()=>({teams:[null,null],winner:null}));
  rounds[2]=Array(4).fill(0).map(()=>({teams:[null,null],winner:null}));
  rounds[3]=Array(2).fill(0).map(()=>({teams:[null,null],winner:null}));
  rounds[4]=Array(1).fill(0).map(()=>({teams:[null,null],winner:null}));
  thirdPlaceMatch={teams:[null,null],winner:null};

  draw();
}

function selectWinner(r,m,i){
  const match=rounds[r][m];
  const winner=match.teams[i];
  const loser=match.teams[1-i];
  match.winner=winner;

  if(r<4){
    const next=Math.floor(m/2);
    const slot=m%2;
    rounds[r+1][next].teams[slot]=winner;
  }

  // SF losers feed the 3rd place match
  if(r===3){
    thirdPlaceMatch.teams[m]=loser;
    thirdPlaceMatch.winner=null;
  }

  draw();
  checkComplete();
}

function selectThirdWinner(i){
  thirdPlaceMatch.winner=thirdPlaceMatch.teams[i];
  draw();
  checkComplete();
}

function draw(){
  const b=document.getElementById("bracket");
  b.innerHTML="";

  const labels=["R32","R16","QF","SF","Final"];

  rounds.forEach((r,ri)=>{
    const col=document.createElement("div");
    col.className="round";
    col.innerHTML=`<div class="roundLabel">${labels[ri]}</div>`;

    r.forEach((m,mi)=>{
      const d=document.createElement("div");
      d.className="match";

      d.innerHTML=`
        <div class="slot ${m.winner===m.teams[0]?'winner':''}"
             onclick="selectWinner(${ri},${mi},0)">
          ${renderTeam(m.teams[0])}
        </div>
        <div class="slot ${m.winner===m.teams[1]?'winner':''}"
             onclick="selectWinner(${ri},${mi},1)">
          ${renderTeam(m.teams[1])}
        </div>
      `;

      col.appendChild(d);
    });

    b.appendChild(col);
  });

  // 3rd place match
  const tp=document.getElementById("thirdPlaceArea");
  const t=thirdPlaceMatch;
  if(t.teams[0]||t.teams[1]){
    tp.style.display="block";
    tp.innerHTML=`
      <h2>3rd Place Match</h2>
      <div class="match" style="max-width:240px;margin:auto">
        <div class="slot ${t.winner===t.teams[0]?'winner':''}"
             onclick="selectThirdWinner(0)">
          ${renderTeam(t.teams[0])||'TBD'}
        </div>
        <div class="slot ${t.winner===t.teams[1]?'winner':''}"
             onclick="selectThirdWinner(1)">
          ${renderTeam(t.teams[1])||'TBD'}
        </div>
      </div>
    `;
  } else {
    tp.style.display="none";
  }
}

function checkComplete(){
  const finalMatch=rounds[4]?.[0];
  if(!finalMatch?.winner || !thirdPlaceMatch.winner) return;

  const champion=finalMatch.winner;
  const runnerup=finalMatch.teams[0]===champion ? finalMatch.teams[1] : finalMatch.teams[0];
  const third=thirdPlaceMatch.winner;

  document.getElementById("champion").innerHTML=`🥇 ${renderTeam(champion)}`;
  document.getElementById("runnerup").innerHTML=`🥈 ${renderTeam(runnerup)}`;
  document.getElementById("third").innerHTML=`🥉 ${renderTeam(third)}`;
  document.getElementById("results").style.display="block";
  document.getElementById("results").scrollIntoView({behavior:"smooth",block:"center"});
}

function shareResults(btn){
  btn.textContent='Generating…';
  btn.disabled=true;

  // Clone the poster into an off-screen container so the live DOM is never mutated
  const el=document.getElementById('posterArea');
  const wrapper=document.createElement('div');
  wrapper.style.cssText='position:fixed;left:-9999px;top:0;width:800px;z-index:-1;background:#0b0f1a;';
  const clone=el.cloneNode(true);

  // Make groups and bracket fully visible in the clone
  const cloneGroups=clone.querySelector('#groups');
  const cloneBracket=clone.querySelector('#bracket');
  if(cloneGroups){
    cloneGroups.style.overflow='visible';
    cloneGroups.style.flexWrap='wrap';
    cloneGroups.querySelectorAll('.group').forEach(g=>g.style.flex='1 1 28%');
  }
  if(cloneBracket){
    cloneBracket.style.overflow='visible';
    cloneBracket.style.flexWrap='wrap';
  }

  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  requestAnimationFrame(()=>requestAnimationFrame(async()=>{
    try{
      const canvas=await html2canvas(wrapper,{
        useCORS:true,
        backgroundColor:'#0b0f1a',
        scale:2,
        logging:false,
        width:wrapper.scrollWidth,
        height:wrapper.scrollHeight,
        windowWidth:800
      });

      document.body.removeChild(wrapper);

      canvas.toBlob(async blob=>{
        const file=new File([blob],'wc2026-bracket.png',{type:'image/png'});
        if(navigator.canShare?.({files:[file]})){
          try{ await navigator.share({title:'My WC 2026 Bracket',files:[file]}); }
          catch(e){ if(e.name!=='AbortError') dlCanvas(canvas); }
        } else {
          dlCanvas(canvas);
        }
        btn.textContent='Share My Bracket';
        btn.disabled=false;
      },'image/png');

    } catch(e){
      if(document.body.contains(wrapper)) document.body.removeChild(wrapper);
      btn.textContent='Share My Bracket';
      btn.disabled=false;
      alert('Could not generate image.');
    }
  }));
}

function dlCanvas(canvas){
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='wc2026-bracket.png';
  a.click();
}

init();

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
